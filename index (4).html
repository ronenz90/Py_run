<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Compiler</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#090910;--surface:#111118;--border:#1e1e2e;--accent:#7fff6e;--accent2:#38bdf8;--text:#e2e8f0;--muted:#4a4a6a;--error:#ff6b6b;--warn:#fbbf24;--panel:#13131d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;background-image:linear-gradient(rgba(127,255,110,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(127,255,110,.025) 1px,transparent 1px);background-size:40px 40px;}
.app{max-width:1400px;margin:0 auto;padding:0 18px;display:flex;flex-direction:column;min-height:100vh;}
header{padding:18px 0 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:grid;place-items:center;font-weight:800;color:#000;font-size:15px;flex-shrink:0;}
.logo-text{font-size:19px;font-weight:800;}.logo-text span{color:var(--accent);}
.pill{display:flex;align-items:center;gap:8px;padding:5px 13px;background:var(--panel);border:1px solid var(--border);border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:11px;transition:all .3s;}
.pill.loading{color:var(--warn);border-color:rgba(251,191,36,.3);}
.pill.ready{color:var(--accent);border-color:rgba(127,255,110,.3);}
.pill.running{color:var(--warn);border-color:rgba(251,191,36,.3);}
.pill.fail{color:var(--error);border-color:rgba(255,107,107,.3);}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.pulse{animation:pulse 1.1s infinite;}
main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 0;}
@media(max-width:780px){main{grid-template-columns:1fr;}}
.col{display:flex;flex-direction:column;gap:12px;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
.phdr{padding:11px 15px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;}
.ptitle{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.pacts{display:flex;gap:7px;}
.prog{height:2px;background:var(--border);overflow:hidden;display:none;}
.prog.on{display:block;}
@keyframes slide{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
.prog-bar{height:100%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:slide 1.2s linear infinite;}
.editor-wrap{flex:1;display:flex;min-height:300px;}
.lnums{padding:13px 9px;background:var(--surface);border-left:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.75;color:var(--muted);user-select:none;text-align:center;min-width:40px;white-space:pre;overflow:hidden;}
#editor{flex:1;background:transparent;border:none;outline:none;padding:13px 11px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.75;color:var(--text);resize:none;tab-size:4;white-space:pre;overflow:auto;caret-color:var(--accent);}
#editor::selection{background:rgba(127,255,110,.18);}
.sec{border-top:1px solid var(--border);padding:11px 15px;background:var(--surface);}
.sec-title{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.drop{border:1.5px dashed var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);transition:all .2s;}
.drop:hover,.drop.over{border-color:var(--accent);background:rgba(127,255,110,.04);color:var(--accent);}
#finput{display:none;}
.flist{margin-top:8px;display:flex;flex-direction:column;gap:5px;}
.fitem{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;}
.fname{color:var(--accent2);}.fsize{color:var(--muted);font-size:11px;}
.frm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px;line-height:1;}
.frm:hover{color:var(--error);}
#output{flex:1;padding:13px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.75;overflow-y:auto;min-height:300px;white-space:pre-wrap;word-break:break-word;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:10px;}
.empty-icon{font-size:30px;opacity:.25;}.empty-txt{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;}
.out-stdout{color:var(--text);display:block;}
.out-stderr{color:var(--error);display:block;}
.out-info{color:var(--accent2);display:block;}
.out-success{color:var(--accent);display:block;}
.out-warn{color:var(--warn);display:block;}
.dl-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.2);border-radius:6px;margin-bottom:5px;font-family:'JetBrains Mono',monospace;font-size:12px;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dl-name{color:var(--accent2);}
.btn-dl{background:var(--accent2);color:#000;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;}
footer{padding:14px 0;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:none;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-run{background:var(--accent);color:#000;padding:10px 24px;font-size:14px;}
.btn-run:hover:not(:disabled){background:#afffab;transform:translateY(-1px);box-shadow:0 0 20px rgba(127,255,110,.2);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--muted);}
.footer-right{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">
    <div class="logo-icon">Py</div>
    <div class="logo-text">Python <span>Compiler</span></div>
  </div>
  <div class="pill loading" id="status">
    <div class="dot pulse" id="dot"></div>
    <span id="stxt">טוען Python...</span>
  </div>
</header>

<main>
  <div class="col">
    <div class="panel" style="flex:1">
      <div class="phdr">
        <span class="ptitle">✦ עורך קוד</span>
        <div class="pacts">
          <button class="btn btn-ghost" onclick="clearEditor()">✕ נקה</button>
          <button class="btn btn-ghost" onclick="loadExample()">⚡ דוגמה</button>
        </div>
      </div>
      <div class="prog" id="prog"><div class="prog-bar"></div></div>
      <div class="editor-wrap">
        <div class="lnums" id="lnums">1</div>
        <textarea id="editor" spellcheck="false"># כתוב קוד Python כאן...
# pandas ו-numpy מותקנים!

print("שלום עולם!")</textarea>
      </div>
    </div>

    <div class="panel">
      <div class="phdr"><span class="ptitle">📁 קבצי קלט</span></div>
      <div style="padding:11px 15px;">
        <div class="drop" id="drop">
          <input type="file" id="finput" multiple>
          לחץ לבחירת קבצים או גרור לכאן
        </div>
        <div class="flist" id="flist"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="phdr">
      <span class="ptitle">◈ פלט</span>
      <button class="btn btn-ghost" onclick="clearOut()">✕ נקה פלט</button>
    </div>
    <div id="output">
      <div class="empty">
        <div class="empty-icon">⏳</div>
        <div class="empty-txt">טוען Python + pandas...<br>כ-20 שניות בפעם הראשונה</div>
      </div>
    </div>
    <div id="dlsec" style="display:none" class="sec">
      <div class="sec-title">⬇ קבצי פלט</div>
      <div id="dllist"></div>
    </div>
  </div>
</main>

<footer>
  <button class="btn btn-run" id="runbtn" onclick="runCode()" disabled>▶ הרץ</button>
  <span class="footer-right">pandas · numpy · matplotlib · scipy | Ctrl+Enter</span>
</footer>
</div>

<script>
let pyodide = null;
let files = {};

// ── Init Pyodide ──────────────────────────────────────────────────────────────
async function initPyodide() {
  try {
    setStatus('loading', 'טוען Python...');
    pyodide = await loadPyodide();

    setStatus('loading', 'מתקין pandas...');
    await pyodide.loadPackage(['pandas', 'numpy', 'matplotlib', 'micropip']);

    setStatus('ready', 'מוכן · pandas ✓');
    document.getElementById('runbtn').disabled = false;
    document.getElementById('output').innerHTML =
      '<div class="empty"><div class="empty-icon">⟩_</div><div class="empty-txt">לחץ הרץ להרצת הקוד</div></div>';
  } catch(e) {
    setStatus('fail', 'שגיאת טעינה');
    appendLine('שגיאה: ' + e, 'stderr');
    document.getElementById('output').querySelector('.empty')?.remove();
  }
}

initPyodide();

// ── Editor ────────────────────────────────────────────────────────────────────
const editor = document.getElementById('editor');
const lnums  = document.getElementById('lnums');
function updateLines() {
  const n = editor.value.split('\n').length;
  lnums.textContent = Array.from({length:n},(_,i)=>i+1).join('\n');
}
editor.addEventListener('input', updateLines);
editor.addEventListener('scroll', () => { lnums.scrollTop = editor.scrollTop; });
editor.addEventListener('keydown', e => {
  if(e.key==='Tab'){
    e.preventDefault();
    const s=editor.selectionStart,en=editor.selectionEnd;
    editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(en);
    editor.selectionStart=editor.selectionEnd=s+4;
    updateLines();
  }
});
updateLines();

function setStatus(cls, text) {
  document.getElementById('status').className = 'pill ' + cls;
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (cls==='loading'||cls==='running' ? ' pulse' : '');
  document.getElementById('stxt').textContent = text;
}

function clearOut() {
  document.getElementById('output').innerHTML =
    '<div class="empty"><div class="empty-icon">⟩_</div><div class="empty-txt">לחץ הרץ להרצת הקוד</div></div>';
  document.getElementById('dllist').innerHTML='';
  document.getElementById('dlsec').style.display='none';
}
function clearEditor() { editor.value=''; updateLines(); }

function appendLine(text, cls) {
  const out = document.getElementById('output');
  out.querySelector('.empty')?.remove();
  const span = document.createElement('span');
  span.className = 'out-' + cls;
  span.textContent = text==='' ? '\u00A0' : text;
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

// ── Run ───────────────────────────────────────────────────────────────────────
async function runCode() {
  if(!pyodide) return;
  const btn = document.getElementById('runbtn');
  const prog = document.getElementById('prog');
  btn.disabled=true; prog.classList.add('on');
  setStatus('running','מריץ...');
  clearOut();

  // Write uploaded files to Pyodide FS
  for(const [name,{data}] of Object.entries(files)) {
    try { pyodide.FS.writeFile('/home/pyodide/'+name, data); } catch(_){}
  }

  // Snapshot files before run
  let before = new Set();
  try { before = new Set(pyodide.FS.readdir('/home/pyodide/')); } catch(_){}

  // Capture output
  const stdout=[], stderr=[];
  pyodide.setStdout({batched: s => { s.split('\n').forEach(l=>appendLine(l,'stdout')); }});
  pyodide.setStderr({batched: s => { s.split('\n').forEach(l=>{ if(l.trim()) appendLine(l,'stderr'); }); }});

  try {
    await pyodide.runPythonAsync(`import os\nos.chdir('/home/pyodide')\n` + editor.value);
  } catch(e) {
    e.toString().split('\n').forEach(l=>appendLine(l,'stderr'));
  }

  // Detect new output files
  try {
    const after = new Set(pyodide.FS.readdir('/home/pyodide/'));
    for(const f of after) {
      if(!before.has(f) && f!=='.'&&f!=='..') {
        try {
          const data = pyodide.FS.readFile('/home/pyodide/'+f);
          let b64='';const chunk=8192;
          for(let i=0;i<data.length;i+=chunk)
            b64+=String.fromCharCode(...data.subarray(i,Math.min(i+chunk,data.length)));
          addDownload(f, btoa(b64));
          appendLine('📄 קובץ פלט: '+f,'info');
        } catch(_){}
      }
    }
  } catch(_){}

  const out=document.getElementById('output');
  if(!out.querySelector('span')) appendLine('✓ הרצה הושלמה ללא פלט','success');

  setStatus('ready','מוכן · pandas ✓');
  btn.disabled=false; prog.classList.remove('on');
}

// ── Downloads ─────────────────────────────────────────────────────────────────
function addDownload(name,b64){
  document.getElementById('dlsec').style.display='';
  const list=document.getElementById('dllist');
  const item=document.createElement('div'); item.className='dl-item';
  const nm=document.createElement('span'); nm.className='dl-name'; nm.textContent='📄 '+name;
  const btn=document.createElement('button'); btn.className='btn-dl'; btn.textContent='⬇ הורד';
  btn.onclick=()=>{
    const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const url=URL.createObjectURL(new Blob([bytes]));
    const a=document.createElement('a'); a.href=url; a.download=name; a.click();
    URL.revokeObjectURL(url);
  };
  item.append(nm,btn); list.appendChild(item);
}

// ── File upload ───────────────────────────────────────────────────────────────
const drop=document.getElementById('drop'),finput=document.getElementById('finput');
drop.addEventListener('click',()=>finput.click());
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');handleFiles(e.dataTransfer.files);});
finput.addEventListener('change',()=>handleFiles(finput.files));

function handleFiles(fl){
  Array.from(fl).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      files[f.name]={size:f.size,data:new Uint8Array(e.target.result)};
      renderFiles();
    };
    r.readAsArrayBuffer(f);
  });
}
function renderFiles(){
  const list=document.getElementById('flist'); list.innerHTML='';
  for(const [name,{size}] of Object.entries(files)){
    const item=document.createElement('div'); item.className='fitem';
    const left=document.createElement('div'); left.style.cssText='display:flex;gap:10px;align-items:center';
    const nm=document.createElement('span'); nm.className='fname'; nm.textContent=name;
    const sz=document.createElement('span'); sz.className='fsize'; sz.textContent=fmtSize(size);
    left.append(nm,sz);
    const rm=document.createElement('button'); rm.className='frm'; rm.textContent='✕';
    rm.onclick=()=>{delete files[name];renderFiles();};
    item.append(left,rm); list.appendChild(item);
  }
}
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';}

function loadExample(){
  editor.value=`import pandas as pd
import numpy as np

df = pd.DataFrame({
    'שם': ['אלי', 'דנה', 'יוסי', 'מיה'],
    'גיל': [28, 34, 22, 41],
    'ציון': [88.5, 92.0, 76.3, 95.1]
})

print("=== נתוני עובדים ===")
print(df.to_string(index=False))
print("\\n=== סטטיסטיקה ===")
print(df[['גיל','ציון']].describe().round(2))

df.to_csv('output.csv', index=False, encoding='utf-8-sig')
print("\\n✓ נשמר output.csv")`;
  updateLines();
}

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')runCode();});
</script>
</body>
</html>
